<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>市場動態 | 美股台股今日消息</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft JhengHei', 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .banner {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            padding: 50px 40px;
            text-align: center;
            margin-bottom: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            position: relative;
        }

        .banner h1 {
            font-size: 2.8em;
            color: white;
            margin-bottom: 15px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .banner p {
            font-size: 1.1em;
            color: rgba(255,255,255,0.9);
            margin-bottom: 30px;
        }

        .banner-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .banner-btn {
            padding: 12px 25px;
            border: 2px solid white;
            background: rgba(255,255,255,0.1);
            color: white;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            font-size: 0.95em;
        }

        .banner-btn:hover {
            background: white;
            color: #667eea;
            transform: scale(1.05);
        }

        .theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid white;
            background: rgba(255,255,255,0.2);
            cursor: pointer;
            font-size: 1.5em;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .theme-toggle:hover {
            background: rgba(255,255,255,0.4);
            transform: scale(1.1);
        }

        .section-title {
            font-size: 1.8em;
            color: white;
            margin: 50px 0 30px 0;
            padding-left: 15px;
            border-left: 4px solid #667eea;
        }

        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px;
            margin-bottom: 50px;
        }

        .news-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .news-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
        }

        .card-header {
            padding: 25px;
            color: white;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .card-number {
            font-size: 2.5em;
            font-weight: bold;
            min-width: 50px;
            opacity: 0.9;
        }

        .card-title {
            font-size: 1.3em;
            font-weight: bold;
        }

        .card-category {
            font-size: 0.9em;
            opacity: 0.85;
            margin-top: 5px;
        }

        .card-body {
            padding: 20px 25px;
            background: #2d2d44;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .card-content {
            color: #e0e0e0;
            line-height: 1.6;
            margin-bottom: 15px;
            font-size: 0.95em;
        }

        .card-highlights {
            list-style: none;
            margin: 15px 0;
        }

        .card-highlights li {
            padding: 8px 0;
            padding-left: 25px;
            position: relative;
            color: #51cf66;
            font-size: 0.9em;
        }

        .card-highlights li:before {
            content: "✓";
            position: absolute;
            left: 0;
            font-weight: bold;
            color: #51cf66;
        }

        .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 15px;
        }

        .tag {
            display: inline-block;
            padding: 5px 12px;
            background: rgba(102, 126, 234, 0.3);
            border: 1px solid #667eea;
            border-radius: 15px;
            font-size: 0.8em;
            color: #a0c4ff;
        }

        .card-source {
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 12px;
            margin-top: 15px;
            font-size: 0.85em;
            color: #999;
        }

        .card-source a {
            color: #a0c4ff;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .card-source a:hover {
            color: #667eea;
            text-decoration: underline;
        }

        .footer {
            text-align: center;
            color: #999;
            margin-top: 50px;
            padding: 20px;
        }

        .update-info {
            background: rgba(102, 126, 234, 0.1);
            padding: 15px;
            border-radius: 8px;
            color: #a0c4ff;
            margin-top: 20px;
            border-left: 4px solid #667eea;
        }

        @media (max-width: 768px) {
            .banner h1 {
                font-size: 2em;
            }

            .section-title {
                font-size: 1.4em;
            }

            .news-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="banner">
            <button class="theme-toggle">🌙</button>
            <h1>📈 財經新聞自動化平台</h1>

                <button class="banner-btn" onclick="alert('✅ 資料已自動更新')">⚡ 資時數據更新</button>
                <button class="banner-btn" onclick="alert('由 Yahoo股、鉅亨網、玩股網 + AI 驅動')">🤖 AI 驅動分析</button>
            </div>
        </div>

        <div>
            <div class="section-title">🔥 前五大台灣人最關注消息</div>
            <div class="news-grid">
                
            </div>
        </div>

        <div class="footer">
            <div class="update-info">

            </div>
        </div>
    </div>

</body>
</html>
